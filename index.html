Alle',...CATS].forEach(x=>{let b=document.createElement('button');b.className='cat '+((cat===''&&x==='Alle')||cat===x?'active':'');b.textContent=x;b.onclick=()=>{cat=x==='Alle'?'':x;renderCats();renderMenu()};c.appendChild(b)})}function renderMenu(){let q=$('search').value.toLowerCase().trim(),box=$('menu');box.innerHTML='';MENU.forEach(m=>{let full=((m.nr||'')+' '+m.name+' '+m.cat).toLowerCase();if(cat&&m.cat!==cat)return;if(q&&!full.includes(q))return;let b=document.createElement('button');b.className='item';b.innerHTML=(m.nr?'<span class="nr">Nr. '+m.nr+'</span><br>':'')+'<b>'+m.name+'</b><span class="meta">'+m.cat+' · '+money(m.price)+'</span>';b.onclick=()=>add(m,b);box.appendChild(b)});if(!box.innerHTML)box.innerHTML='<div class="mut">Nichts gefunden.</div>'}function key(x){return (x.nr||x.name)+'|'+x.name}function add(m,b){let it=td(table).items.find(x=>key(x)===key(m));if(it)it.qty++;else td(table).items.push({...m,qty:1});save();b.classList.add('added');setTimeout(()=>b.classList.remove('added'),300);toast(m.name+' gewählt');renderOrder()}function renderOrder(){let box=$('order');box.innerHTML='';if(!td(table).items.length)box.innerHTML='<div class="mut">Noch keine Bestellung.</div>';td(table).items.forEach((x,i)=>{let d=document.createElement('div');d.className='ord';d.innerHTML='<div class="ordtop"><div><b>'+x.qty+' × '+(x.nr?'Nr. '+x.nr+' · ':'')+x.name+'</b><br><span class="mut">'+money(x.price)+' / Stück · '+money(x.qty*x.price)+'</span></div><div class="qty"><button class="danger" onclick="chg('+i+',-1)">−</button><button class="primary" onclick="chg('+i+',1)">+</button></div></div>';box.appendChild(d)});$('sum').textContent='Summe: '+money(total(table))}function chg(i,d){let a=td(table).items;a[i].qty+=d;if(a[i].qty<=0)a.splice(i,1);save();renderOrder()}function saveNote(){td(table).note=$('note').value;save()}function clearTable(){if(confirm('Tisch '+table+' wirklich leeren?')){orders[table]={items:[],note:''};save();showTables()}}function ticketText(kind){let txt='Tisch '+table+'\n\n';let arr=td(table).items.filter(x=>kind==='all'||x.type===kind);arr.forEach(x=>txt+=x.qty+' × '+(x.nr?'Nr. '+x.nr+' · ':'')+x.name+'\n');if(td(table).note&&kind!=='drink')txt+='\nNotiz: '+td(table).note+'\n';return txt}function copyTicket(kind){let txt=ticketText(kind);navigator.clipboard.writeText(txt).then(()=>toast((kind==='food'?'Küchenbon':'Getränkebon')+' kopiert'))}function copyOrder(){let txt='Tisch '+table+'\n\n';td(table).items.forEach(x=>txt+=x.qty+' × '+(x.nr?'Nr. '+x.nr+' · ':'')+x.name+' = '+money(x.qty*x.price)+'\n');if(td(table).note)txt+='\nNotiz: '+td(table).note+'\n';txt+='\nSumme: '+money(total(table));navigator.clipboard.writeText(txt).then(()=>toast('Bestellung kopiert'))}function renderSummary(){let r=[];for(let t=1;t<=29;t++){let s=total(t);if(s>0)r.push('Tisch '+t+': '+money(s))}$('summary').innerHTML=r.length?r.join('<br>'):'Keine offenen Tische.'}
function dd(n){if(!drinks[n])drinks[n]={need:0,boxes:0,bottles:0};return drinks[n]}function showDrinks(mode){drinkMode=mode;hide();$('drinkV').classList.remove('hidden');renderDrinks()}function setDrink(n,field,val){dd(n)[field]=Math.max(0,parseInt(val||0));saveDrinks()}function renderDrinks(){$('drinkTitle').textContent=drinkMode==='need'?'🍺 Bedarf Restaurant':'📦 Aktuelle Bestände';$('needTab').className=drinkMode==='need'?'primary':'back';$('stockTab').className=drinkMode==='stock'?'primary':'back';let q=($('drinkSearch')?.value||'').toLowerCase(),box=$('drinkList');box.innerHTML='';DRINKS.filter(n=>n.toLowerCase().includes(q)).forEach(n=>{let d=dd(n),row=document.createElement('div');row.className='drinkrow';if(drinkMode==='need'){row.innerHTML='<div class="needline"><b>'+n+'</b><div><div class="label">Flaschen fehlen</div><input type="number" min="0" inputmode="numeric" value="'+d.need+'" onchange="setDrink(\''+n+'\',\'need\',this.value)"></div></div>';}else{row.innerHTML='<div class="bestandline"><b>'+n+'</b><div><div class="label">Kisten</div><input type="number" min="0" inputmode="numeric" value="'+d.boxes+'" onchange="setDrink(\''+n+'\',\'boxes\',this.value)"></div><div><div class="label">Flaschen</div><input type="number" min="0" inputmode="numeric" value="'+d.bottles+'" onchange="setDrink(\''+n+'\',\'bottles\',this.value)"></div></div>';}box.appendChild(row)})}function copyDrinks(){let txt=drinkMode==='need'?'Bedarf Restaurant - fehlende Flaschen\n\n':'Aktuelle Bestände\n\n';DRINKS.forEach(n=>{let d=dd(n);if(drinkMode==='need'&&d.need>0)txt+=n+': '+d.need+' Flasche(n)\n';if(drinkMode==='stock'&&(d.boxes>0||d.bottles>0))txt+=n+': '+d.boxes+' Kiste(n), '+d.bottles+' Flasche(n)\n';});navigator.clipboard.writeText(txt).then(()=>toast('Liste kopiert'))}
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js')}
showStart();
